substitutions:
  name: ANJ-4000W-24V-WIFI
  device_description: "Monitor and control a Anenji inverter"
  tx_pin: GPIO15
  rx_pin: GPIO13

esphome:
  name: ${name}
  comment: ${device_description}
  min_version: 2024.6.0
  project:
    name: "syssi.esphome-ANJ-4000W-24V-WIFI"
    version: 1.3.0

esp8266:
  board: nodemcu

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
  platform: esphome

logger:
  level: INFO

api:

# Выходы для светодиодов
output:
  - platform: gpio
    pin: GPIO4
    id: modbus_led_out
  - platform: gpio
    pin: GPIO5
    id: wifi_status_led_out

# Виртуальный свет для управления миганием
light:
  - platform: binary
    output: modbus_led_out
    id: modbus_activity_led

binary_sensor:
  # Логика для GPIO5: 1 при наличии связи, 0 при потере
  - platform: status
    name: "${name} Connectivity Status"
    on_press:
      then:
        - output.turn_on: wifi_status_led_out
    on_release:
      then:
        - output.turn_off: wifi_status_led_out

uart:
  - id: uart_0
    baud_rate: 9600
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}

modbus:
  - id: modbus0
    uart_id: uart_0
    send_wait_time: 200ms

modbus_controller:
  - id: anj0
    address: 0x01
    modbus_id: modbus0
    command_throttle: 200ms
    update_interval: 3s
    # Мигание GPIO4 при успешном обмене данными
    on_data:
      then:
        - light.turn_on: modbus_activity_led
        - delay: 100ms
        - light.turn_off: modbus_activity_led

time:
  - platform: sntp

sensor:
  - platform: total_daily_energy
    name: "${name} PV energy today"
    restore: true
    device_class: energy
    power_id: anj0_pv_average_power
    filters:
      - multiply: 0.001
    unit_of_measurement: kWh

  - platform: template
    name: "${name} discharging power"
    id: anj0_discharging_power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    icon: mdi:battery-arrow-down
    update_interval: never
    lambda: |-
      if (isnan(id(anj0_battery_average_power).state)) {
        return {};
      }
      auto power = id(anj0_battery_average_power).state;
      return (power < 0.0f) ? -power : 0.0f;

  - platform: template
    name: "${name} charging power"
    id: anj0_charging_power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    icon: mdi:battery-charging
    update_interval: never
    lambda: |-
      if (isnan(id(anj0_battery_average_power).state)) {
        return {};
      }
      auto power = id(anj0_battery_average_power).state;
      return (power > 0.0f) ? power : 0.0f;

  - platform: modbus_controller
    modbus_controller_id: anj0
    name: "${name} fault code"
    address: 100
    register_type: holding
    value_type: U_DWORD
    accuracy_decimals: 0
    icon: mdi:alert-circle

  - platform: modbus_controller
