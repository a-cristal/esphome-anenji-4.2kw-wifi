substitutions:
  name: ANJ-4000W-24V-WIFI
  device_description: "Monitor and control a Anenji inverter"
  tx_pin: GPIO15
  rx_pin: GPIO13

esphome:
  name: ${name}
  comment: ${device_description}
  min_version: 2024.6.0
  project:
    name: "syssi.esphome-ANJ-4000W-24V-WIFI"
    version: 1.3.0

# Change to esp32: board: ... if you are using an ESP32 chip
esp8266:
  board: nodemcu

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Enable fast connection to the router
  fast_connect: true 

ota:
  platform: esphome

logger:
  level: INFO

api:
  # Encryption key for secure communication with Home Assistant
  # encryption:
  #   key: !secret api_encryption_key

# GPIO output configuration for LEDs
output:
  - platform: gpio
    pin: GPIO4
    id: modbus_led_out
  - platform: gpio
    pin: GPIO5
    id: wifi_status_led_out

# Virtual light component to control Modbus activity blinking
light:
  - platform: binary
    output: modbus_led_out
    id: modbus_activity_led

binary_sensor:
  # Connection status: Logic 1 on GPIO5 when connected, 0 when disconnected
  - platform: status
    name: "${name} Connectivity"
    id: system_status
    on_press:
      then:
        - output.turn_on: wifi_status_led_out
    on_release:
      then:
        - output.turn_off: wifi_status_led_out

uart:
  - id: uart_0
    baud_rate: 9600
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}

modbus:
  - id: modbus0
    uart_id: uart_0
    send_wait_time: 200ms

modbus_controller:
  - id: anj0
    address: 0x01
    modbus_id: modbus0
    command_throttle: 200ms
    update_interval: 3s
    # Trigger LED on GPIO4 upon successful data reception
    on_data:
      then:
        - light.turn_on: modbus_activity_led
        - delay: 100ms
        - light.turn_off: modbus_activity_led

time:
  - platform: sntp

sensor:
  # Total solar energy produced today
  - platform: total_daily_energy
    name: "${name} PV energy today"
    restore: true
    device_class: energy
    power_id: anj0_pv_average_power
    filters:
      - multiply: 0.001
    unit_of_measurement: kWh

  # Calculated battery discharging power
  - platform: template
    name: "${name} discharging power"
    id: anj0_discharging_power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    icon: mdi:battery-arrow-down
    update_interval: never
    lambda: |-
      if (isnan(id(anj0_battery_average_power).state)) return {};
      auto power = id(anj0_battery_average_power).state;
      return (power < 0.0f) ? -power : 0.0f;

  # Calculated battery charging power
  - platform: template
    name: "${name} charging power"
    id: anj0_charging_power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    icon: mdi:battery-charging
    update_interval: never
    lambda: |-
      if (isnan(id(anj0_battery_average_power).state)) return {};
      auto power = id(anj0_battery_average_power).state;
      return (power > 0.0f) ? power : 0.0f;

  # AC Mains Input Voltage
  - platform: modbus_controller
    modbus_controller_id: anj0
    name: "${name} ac voltage"
    address: 202
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 1
    filters: { multiply: 0.1 }

  # Battery Bank Voltage
  - platform: modbus_controller
    modbus_controller_id: anj0
    name: "${name} battery average voltage"
    address: 215
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 1
    filters: { multiply: 0.1 }

  # Battery Power (Positive = Charging, Negative = Discharging)
  - platform: modbus_controller
    modbus_controller_id: anj0
    name: "${name} battery average power"
    id: anj0_battery_average_power
    address: 217
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    on_value:
      - component.update: anj0_discharging_power
      - component.update: anj0_charging_power

  # Solar Panel (PV) Power
  - platform: modbus_controller
    modbus_controller_id: anj0
    id: anj0_pv_average_power
    name: "${name} pv average power"
    address: 223
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power

  # Battery State of Charge (Percentage)
  - platform: modbus_controller
    modbus_controller_id: anj0
    name: "${name} battery state of charge"
    address: 229
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "%"
    device_class: battery

text_sensor:
  # Decodes fault bitmask into human-readable English text for Home Assistant
  - platform: modbus_controller
    modbus_controller_id: anj0
    name: "${name} Fault Message"
    id: fault_message
    address: 100
    register_type: holding
    register_count: 2
    response_size: 4
    raw_encode: HEXBYTES
    icon: mdi:alert-circle
    lambda: |-
      static const char *const FAULTS[] = {
          "Over temp Inverter", "Over temp DCDC", "Battery Over Voltage", "PV Over temp",
          "Short Circuit", "Inverter Over Voltage", "Overload", "Bus Over Voltage",
          "Bus Soft Start Fail", "PV Over Current", "PV Over Voltage", "Battery Over Current",
          "Inverter Over Current", "Bus Low Voltage", "Res", "Inverter DC High",
          "Res", "Zero Bias Out", "Zero Bias Inv", "Zero Bias Batt", "Zero Bias PV",
          "Inverter Low Voltage", "Neg Power", "Parallel Lost", "Sync Signal Err",
          "Batt Incompatible", "Parallel Incompatible"
      };
      std::string v = "";
      uint32_t mask = modbus_controller::dword_from_hex_str(x, 0);
      for (int i = 0; i < 27; i++) { if (mask & (1 << i)) { v += FAULTS[i]; v += "; "; } }
      return v.empty() ? "No Faults" : v;

  # Decodes warning bitmask into human-readable English text
  - platform: modbus_controller
    modbus_controller_id: anj0
    name: "${name} Warning Message"
    id: warning_message
    address: 108
    register_type: holding
    register_count: 2
    response_size: 4
    raw_encode: HEXBYTES
    icon: mdi:alert-outline
    lambda: |-
      static const char *const WARNINGS[] = {
          "Res", "Mains Waveform Abn", "Res", "Mains Low V", "Mains Over Freq",
          "Mains Low Freq", "PV Low V", "Over Temp", "Batt Low V", "Batt Not Connected",
          "Overload", "Batt Eq", "Batt Undervoltage", "Power Derating", "Fan Blocked",
          "PV Low Energy", "Parallel Comm Err", "Output Mode Err", "Batt Volt Diff"
      };
      std::string v = "";
      uint32_t mask = modbus_controller::dword_from_hex_str(x, 0);
      for (int i = 0; i < 19; i++) { if (mask & (1 << i)) { v += WARNINGS[i]; v += "; "; } }
      return v.empty() ? "No Warnings" : v;

  # Current inverter operating mode
  - platform: modbus_controller
    modbus_controller_id: anj0
    name: "${name} operation mode"
    address: 201
    register_type: holding
    raw_encode: HEXBYTES
    icon: mdi:information
    lambda: |-
      uint16_t value = modbus_controller::word_from_hex_str(x, 0);
      switch (value) {
        case 0: return std::string("Power On");
        case 1: return std::string("Standby");
        case 2: return std::string("Mains");
        case 3: return std::string("Off-Grid");
        case 4: return std::string("Bypass");
        case 5: return std::string("Charging");
        case 6: return std::string("Fault");
      }
      return std::string("Unknown");

button:
  # Button to manually clear fault state on the inverter
  - platform: template
    name: "${name} exit fault state"
    icon: mdi:restore
    on_press:
      then:
        - lambda: |-
            auto cmd = esphome::modbus_controller::ModbusCommandItem::create_write_multiple_command(id(anj0), 426, 1, {1});
            id(anj0)->queue_command(cmd);
