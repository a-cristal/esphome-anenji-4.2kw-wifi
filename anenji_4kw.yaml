text_sensor:
  - platform: modbus_controller
    modbus_controller_id: anj0
    name: "${name} fault"
    address: 100
    register_type: holding
    register_count: 2
    response_size: 4
    raw_encode: HEXBYTES
    icon: mdi:alert-circle
    lambda: |-
      static const uint8_t FAULTS_SIZE = 27;
      static const char *const FAULTS[FAULTS_SIZE] = {
          "Over temperature of inverter module",
          "Over temperature of DCDC module",
          "Battery over voltage",
          "PV module over temperature",
          "Output short circuit",
          "Inverter over voltage",
          "Output over load",
          "Bus over voltage",
          "Bus soft start timed out",
          "PV over current",
          "PV over voltage",
          "Battery over current",
          "Inverter over current",
          "Bus low voltage",
          "Reserve (Bit 15)",
          "Inverter DC component is too high",
          "Reserve (Bit 17)",
          "The zero bias of output current is too large",
          "The zero bias of inverter current is too large",
          "The zero bias of battery current is too large",
          "The zero bias of PV current is too large",
          "Inverter low voltage",
          "Inverter negative power protection",
          "The host in the parallel system is lost",
          "Synchronization signal abnormal in the parallel system",
          "The battery type is incompatible",
          "Parallel versions are incompatible",
      };
      std::string values = "";
      uint32_t mask = modbus_controller::dword_from_hex_str(x, 0);
      if (mask) {
        for (int i = 0; i < FAULTS_SIZE; i++) {
          if (mask & (1 << i)) {
            values.append(FAULTS[i]);
            values.append(";");
          }
        }
        if (!values.empty()) {
          values.pop_back();
        }
      }
      return values;

  - platform: modbus_controller
    modbus_controller_id: anj0
    name: "${name} warning"
    address: 108
    register_type: holding
    register_count: 2
    response_size: 4
    raw_encode: HEXBYTES
    icon: mdi:alert-circle
    lambda: |-
      static const uint8_t WARNINGS_SIZE = 19;
      static const char *const WARNINGS[WARNINGS_SIZE] = {
          "Reserve (Bit 0)",
          "Mains waveform abnormal",
          "Reserve (Bit 2)",
          "Mains low voltage",
          "Mains over frequency",
          "Mains low frequency",
          "PV low voltage",
          "Over temperature",
          "Battery low voltage",
          "Battery is not connected",
          "Overload",
          "Battery Eq charging",
          "Battery undervoltage",
          "Output power derating",
          "Fan blocked",
          "PV energy is too low to be use",
          "Parallel communication interrupted",
          "Output mode of Single and Parallel systems inconsistent",
          "Battery voltage difference of parallel system is too large",
      };
      std::string values = "";
      uint32_t mask = modbus_controller::dword_from_hex_str(x, 0);
      if (mask) {
        for (int i = 0; i < WARNINGS_SIZE; i++) {
          if (mask & (1 << i)) {
            values.append(WARNINGS[i]);
            values.append(";");
          }
        }
        if (!values.empty()) {
          values.pop_back();
        }
      }
      return values;

  - platform: modbus_controller
    modbus_controller_id: anj0
    name: "${name} operation mode"
    address: 201
    register_type: holding
    raw_encode: HEXBYTES
    icon: mdi:information
    lambda: |-
      uint16_t value = modbus_controller::word_from_hex_str(x, 0);
      switch (value) {
        case 0: return std::string("Power On");
        case 1: return std::string("Standby");
        case 2: return std::string("Mains");
        case 3: return std::string("Off-Grid");
        case 4: return std::string("Bypass");
        case 5: return std::string("Charging");
        case 6: return std::string("Fault");
      }
      return std::string("Unknown");

number:
  - platform: modbus_controller
    modbus_controller_id: anj0
    name: "${name} output voltage"
    use_write_multiple: true
    address: 320
    register_type: holding
    value_type: U_WORD
    min_value: 0.0
    step: 0.1
    unit_of_measurement: "V"
    entity_category: config
    icon: mdi:cog
    lambda: "return x * 0.1f;"
    write_lambda: |-
      return x * 10.0f;

  - platform: modbus_controller
    modbus_controller_id: anj0
    name: "${name} output frequency setting"
    use_write_multiple: true
    address: 321
    register_type: holding
    value_type: U_WORD
    min_value: 0.0
    step: 0.01
    unit_of_measurement: "Hz"
    entity_category: config
    icon: mdi:cog
    lambda: "return x * 0.01f;"
